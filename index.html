<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deo Sax Studio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* TOP BAR */
.header {
  padding: 20px;
  background: #000;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h2 {
  color: gold;
  margin: 0;
}

/* HERO */
.hero {
  padding: 60px 20px;
  text-align: center;
  background: radial-gradient(circle, #1a1a1a, #000);
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  color: #bbb;
}

/* PLAYLIST */
.section {
  padding: 20px;
}

.track {
  background: #151515;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}

.track:hover {
  background: #222;
}

.track h3 {
  margin: 0;
  font-size: 16px;
  color: white;
}

.play-btn {
  background: gold;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
}

/* PLAYER BAR */
.player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #000;
  padding: 15px;
  border-top: 1px solid #222;
}

.player-title {
  font-size: 14px;
  margin-bottom: 8px;
  color: #ccc;
}

audio {
  width: 100%;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
}
</style>
</head>

<body>

<div class="header">
  <h2>🎷 Deo Sax</h2>
</div>

<div class="hero">
  <h1>Deo Sax Studio</h1>
  <p>Afro Gospel • Worship • Sax Experience</p>
</div>

<div class="section">
  <h2>🎵 Playlist</h2>

  <div class="track" onclick="playSong('praise-god.mp3','Praise God')">
    <h3>Praise God</h3>
    <button class="play-btn">Play</button>
  </div>

  <div class="track" onclick="playSong('baba-na-you.mp3','Baba Na You')">
    <h3>Baba Na You</h3>
    <button class="play-btn">Play</button>
  </div>

</div>

<div class="player">
  <div class="player-title" id="nowPlaying">Now Playing: None</div>
  <audio id="audioPlayer" controls></audio>
</div>

<footer>
  © 2026 Deo Sax Studio
</footer>

<script>
function playSong(file, title) {
  const player = document.getElementById("audioPlayer");
  const nowPlaying = document.getElementById("nowPlaying");

  player.src = file;
  player.play();
  nowPlaying.innerText = "Now Playing: " + title;
}
</script>

</body>
</html>
