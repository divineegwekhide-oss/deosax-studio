<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deo Sax Studio - Music Platform</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:black;
  position:sticky;
  top:0;
}

.logo{
  color:gold;
  font-weight:bold;
}

/* SEARCH */
.search{
  padding:10px;
  width:90%;
  margin:10px auto;
  display:block;
  border-radius:8px;
  border:none;
}

/* SECTIONS */
.section{
  padding:15px;
}

h2{
  color:gold;
  font-size:18px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#151515;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

.card:hover{
  background:#222;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#000;
  border-top:1px solid #222;
  padding:10px;
}

.now{
  font-size:13px;
  color:#bbb;
}

audio{
  width:100%;
}

/* BUTTONS */
.btn{
  background:gold;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🎷 Deo Sax Platform</div>
</div>

<input class="search" placeholder="Search music..." onkeyup="searchMusic(this.value)">

<div class="section">
  <h2>🔥 Afro Gospel</h2>
  <div class="grid" id="afro">

    <div class="card" onclick="playSong(0)">
      <b>Praise God</b><br>
      <button class="btn">Play</button>
    </div>

    <div class="card" onclick="playSong(1)">
      <b>Baba Na You</b><br>
      <button class="btn">Play</button>
    </div>

  </div>
</div>

<div class="section">
  <h2>🎧 Worship Collection</h2>
  <div class="grid">
    <div class="card">Coming soon</div>
    <div class="card">Coming soon</div>
  </div>
</div>

<!-- PLAYER -->
<div class="player">
  <div class="now" id="now">Now Playing: None</div>
  <audio id="audio" controls></audio>
</div>

<script>
const songs = [
  {title:"Praise God", file:"praise-God.mp3"},
  {title:"Baba Na You", file:"baba-na-you.mp3"}
];

let current = 0;

const audio = document.getElementById("audio");
const now = document.getElementById("now");

function playSong(i){
  current = i;
  audio.src = songs[i].file;
  audio.play();
  now.innerText = "Now Playing: " + songs[i].title;
}

function searchMusic(value){
  let cards = document.querySelectorAll(".card");
  value = value.toLowerCase();

  cards.forEach(card=>{
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(value) ? "block":"none";
  });
}

audio.addEventListener("ended", ()=>{
  current = (current + 1) % songs.length;
  playSong(current);
});
</script>

</body>
</html>
