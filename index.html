<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deo Sax Studio - Stream</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
.header {
  padding: 15px 20px;
  background: #000;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h2 {
  color: gold;
  margin: 0;
}

/* HERO */
.hero {
  padding: 50px 20px;
  text-align: center;
  background: radial-gradient(circle, #1a1a1a, #000);
}

.hero h1 {
  font-size: 38px;
}

.hero p {
  color: #aaa;
}

/* PLAYLIST */
.section {
  padding: 20px;
}

.track {
  background: #151515;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.track:hover {
  background: #222;
}

.track button {
  background: gold;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
}

/* PLAYER BAR */
.player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #000;
  border-top: 1px solid #222;
  padding: 10px 15px;
}

.now {
  font-size: 13px;
  color: #bbb;
  margin-bottom: 5px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

.controls button {
  background: #222;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.controls button:hover {
  background: #333;
}

audio {
  width: 100%;
}
</style>
</head>

<body>

<div class="header">
  <h2>🎷 Deo Sax Stream</h2>
</div>

<div class="hero">
  <h1>Deo Sax Studio</h1>
  <p>Afro Gospel Streaming Experience</p>
</div>

<div class="section">

  <div class="track">
    <span>Praise God</span>
    <button onclick="playSong(0)">Play</button>
  </div>

  <div class="track">
    <span>Baba Na You</span>
    <button onclick="playSong(1)">Play</button>
  </div>

</div>

<!-- PLAYER -->
<div class="player">
  <div class="now" id="nowPlaying">Now Playing: None</div>

  <audio id="audio"></audio>

  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()">⏯</button>
    <button onclick="nextSong()">⏭</button>
    <button onclick="toggleShuffle()">🔀</button>
    <button onclick="toggleRepeat()">🔁</button>
  </div>
</div>

<script>
const songs = [
  {title:"Praise God", file:"praise-God.mp3"},
  {title:"Baba Na You", file:"baba-na-you.mp3"}
];

let current = 0;
let shuffle = false;
let repeat = false;

const audio = document.getElementById("audio");
const nowPlaying = document.getElementById("nowPlaying");

function playSong(index){
  current = index;
  audio.src = songs[current].file;
  audio.play();
  nowPlaying.innerText = "Now Playing: " + songs[current].title;
}

function nextSong(){
  if(shuffle){
    current = Math.floor(Math.random() * songs.length);
  } else {
    current = (current + 1) % songs.length;
  }
  playSong(current);
}

function prevSong(){
  current = (current - 1 + songs.length) % songs.length;
  playSong(current);
}

function togglePlay(){
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
}

function toggleShuffle(){
  shuffle = !shuffle;
  alert("Shuffle: " + shuffle);
}

function toggleRepeat(){
  repeat = !repeat;
  alert("Repeat: " + repeat);
}

audio.addEventListener("ended", () => {
  if(repeat){
    audio.play();
  } else {
    nextSong();
  }
});
</script>

</body>
</html>
